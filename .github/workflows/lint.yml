name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flake8:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install flake8
        run: python -m pip install --upgrade pip flake8
      - name: Run flake8
        # E501: line too long — toleramos linhas longas em strings JSON/SQL
        # W503: line break before binary operator — convenção atual permitida
        # E203: whitespace before ':' — conflita com PEP 8 + black
        run: |
          flake8 . \
            --count \
            --max-line-length=120 \
            --ignore=E501,W503,E203 \
            --exclude=.venv,.git,__pycache__,build,dist \
            --show-source \
            --statistics
