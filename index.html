  // ==========================================================================
  function exportCsv() {
    const headers = ['id','segmento','nome','dono','cnpj','cidade','bairro','telefone','whatsapp','wa_ativo','instagram','site','email','status','motivo_perda','notas','historico_atividade','follow_up_inicio','score_prioridade'];
    const rows = LEADS.leads.map(l => {
      const s = state.leads[l.id];
      const m = mergeOverrides(l);
      const notes    = (s.notes    || []).map(n => n.text || '').join(' | ');
      const activity = (s.activity || []).map(a => {
        const d = new Date(a.t).toLocaleDateString('pt-BR');
        return `[${d}] ${a.msg || ''}`;
      }).join(' | ');
      const fuStart = s.followup_start ? new Date(s.followup_start).toLocaleDateString('pt-BR') : '';
      return [
        l.id,
        l.segmento || '',
        l.nome || '',
        m.dono || '',
        l.cnpj || '',
        l.cidade || '',
        (l.bairro || '').split(',')[0],
        m.telefone || '',
        l.whatsapp_numero || '',
        l.whatsapp_ativo ? 'sim' : 'nao',
        m.instagram_local_url || (l.instagram && l.instagram.url) || '',
        m.site || '',
        m.email || '',
        STATUSES.find(st => st.id === s.status)?.label || 'Novo',
        s.loss_reason || '',
        notes,
        activity,
        fuStart,
        Math.round(l.priority_score || 0),
      ].map(v => `"${String(v).replace(/"/g, '""')}"`).join(',');
    });
    const csv = '\ufeff' + headers.join(',') + '\n' + rows.join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `crm-backup-${new Date().toISOString().slice(0,10)}.csv`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('CSV exportado com notas e hist\u00f3rico');
  }

  // ==========================================================================
  // FUNIL DE VENDAS
  // ==========================================================================

  // Ordem dos degraus do funil (crescente)
  const FUNNEL_ORDER = ['abordado', 'engajado', 'reuniao', 'fechado'];

  // Mapeamento de status do kanban para degrau do funil
  const KANBAN_TO_FUNNEL = {
    abordado:     'abordado',
    sem_resposta: 'abordado',
    respondeu:    'engajado',
    agendado:     'reuniao',
    ganhou:       'fechado',
    perdeu:       null,  // determinado pelo histórico ou override
  };

  // Percentuais de referência fornecidos (médias de mercado)
  const FUNNEL_REFS = { engajado: 60, reuniao: 25, fechado: 33 };

  // Retorna o degrau máximo do funil que um lead atingiu
  function getMaxStageFunnel(leadId) {
    const ls = state.leads[leadId];
    if (!ls) return null;
    const currentStatus = ls.status || 'novo';
    if (currentStatus === 'novo') return null;

    // 1. Override manual tem prioridade
    if (ls.overrides?.max_stage) return ls.overrides.max_stage;

    // 2. Bot em "respondeu" → trava em abordado, sem varrer histórico
    const isBotRespondeu = (ls.is_bot === '1x' || ls.is_bot === 'infinito') && currentStatus === 'respondeu';
    if (isBotRespondeu) return 'abordado';

    // 3. Mapeia status atual
    let maxFunnel = KANBAN_TO_FUNNEL[currentStatus] || null;

    // 4. Varre histórico de atividade em busca de etapas mais altas
    const activity = ls.activity || [];
    for (const act of activity) {
      const msg = act.msg || '';
      const match = msg.match(/para (.+)$/);
      if (!match) continue;
      const stageName = match[1].trim();
      const kanbanStage = STATUSES.find(s => s.label === stageName)?.id;
      const funnelStage = kanbanStage ? KANBAN_TO_FUNNEL[kanbanStage] : null;
      if (!funnelStage) continue;
      const curIdx = maxFunnel ? FUNNEL_ORDER.indexOf(maxFunnel) : -1;
      const newIdx = FUNNEL_ORDER.indexOf(funnelStage);
      if (newIdx > curIdx) maxFunnel = funnelStage;
    }

    return maxFunnel;
  }

  // Calcula contagens por degrau (cada lead conta em todos os degraus que atingiu)
  function calcFunnel() {
    const counts = { abordado: 0, engajado: 0, reuniao: 0, fechado: 0 };
    LEADS.leads.forEach(l => {
      const maxStage = getMaxStageFunnel(l.id);
      if (!maxStage) return;
      const maxIdx = FUNNEL_ORDER.indexOf(maxStage);
      FUNNEL_ORDER.forEach((stage, idx) => { if (idx <= maxIdx) counts[stage]++; });
    });
    return counts;
  }

  // Agrupa perdas por degrau e motivo
  function calcLossByStage() {
    const byStage = {};
    FUNNEL_ORDER.forEach(s => { byStage[s] = {}; });
    LEADS.leads.forEach(l => {
      const ls = state.leads[l.id];
      if (!ls || ls.status !== 'perdeu') return;
      const maxStage = getMaxStageFunnel(l.id) || 'abordado';
      const reason = ls.loss_reason || 'Não informado';
      byStage[maxStage][reason] = (byStage[maxStage][reason] || 0) + 1;
    });
    return byStage;
  }

  function openFunnelModal() {
    document.getElementById('funnel-modal-overlay')?.remove();

    const counts = calcFunnel();
    const lossByStage = calcLossByStage();
    const totalPerdidos = LEADS.leads.filter(l => state.leads[l.id]?.status === 'perdeu').length;
    const bot1x  = LEADS.leads.filter(l => state.leads[l.id]?.is_bot === '1x'       && state.leads[l.id]?.status === 'respondeu').length;
    const botInf = LEADS.leads.filter(l => state.leads[l.id]?.is_bot === 'infinito' && state.leads[l.id]?.status === 'respondeu').length;
    const totalBots = bot1x + botInf;

    // Contagem global de motivos de perda
    const reasonTotals = {};
    LEADS.leads.forEach(l => {
      const ls = state.leads[l.id];
      if (!ls || ls.status !== 'perdeu') return;
      const r = ls.loss_reason || 'Não informado';
      reasonTotals[r] = (reasonTotals[r] || 0) + 1;
    });
    const sortedReasons = Object.entries(reasonTotals).sort((a, b) => b[1] - a[1]);

    const STAGE_META = [
      { id: 'abordado', label: 'Abordados',        sub: 'saíram do Novo',         prev: null },
      { id: 'engajado', label: 'Engajados',         sub: 'responderam',            prev: 'abordado' },
      { id: 'reuniao',  label: 'Reuniões',          sub: 'agendaram',              prev: 'engajado' },
      { id: 'fechado',  label: 'Fechados',          sub: 'ganharam',               prev: 'reuniao' },
    ];

    const maxCount = counts.abordado || 1;

    function stageBlock(s) {
      const count = counts[s.id] || 0;
      const pct   = maxCount > 0 ? Math.round((count / maxCount) * 100) : 0;
      const barW  = pct;

      let convBlock = '';
      if (s.prev) {
        const prevCount = counts[s.prev] || 0;
        const conv = prevCount > 0 ? Math.round((count / prevCount) * 100) : 0;
        const ref  = FUNNEL_REFS[s.id] || 0;
        const col  = prevCount === 0 ? '#525252' : conv >= ref ? '#10B981' : conv >= ref * 0.6 ? '#F59E0B' : '#EF4444';
        const refLabel = ref > 0 ? `ref. mercado: ${ref}%` : '';
        convBlock = `
          <div style="display:flex;align-items:center;gap:6px;padding:5px 0 5px 18px;border-left:2px solid #1E1E1E;margin-left:8px">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
            <span style="font-size:14px;font-weight:700;color:${col}">${prevCount < 3 ? '—' : conv + '%'}</span>
            ${refLabel ? `<span style="font-size:11px;color:#404040">${refLabel}</span>` : ''}
          </div>`;

        // Perdas nesta transição
        const lossHere = lossByStage[s.prev] || {};
        const lossTotal = Object.values(lossHere).reduce((a, b) => a + b, 0);
        if (lossTotal > 0) {
          const lossItems = Object.entries(lossHere).sort((a,b)=>b[1]-a[1])
            .map(([r, n]) => `<span style="font-size:11px;color:#737373">${esc(r)} <strong style="color:#F87171">${n}</strong></span>`)
            .join('<span style="color:#333;margin:0 4px">·</span>');
          convBlock += `
            <div style="display:flex;flex-wrap:wrap;align-items:center;gap:4px;padding:4px 0 4px 18px;border-left:2px solid #1E1E1E;margin-left:8px">
              <span style="font-size:10px;color:#525252;text-transform:uppercase;letter-spacing:0.06em;margin-right:4px">perdas:</span>
              ${lossItems}
            </div>`;
        }
      }

      return `${convBlock}
        <div style="background:#1A1A1A;border:1px solid #262626;border-radius:10px;padding:14px 16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div>
              <span style="font-size:13px;font-weight:600;color:#F5F5F5">${s.label}</span>
              <span style="font-size:11px;color:#525252;margin-left:6px">${s.sub}</span>
            </div>
            <div style="display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;justify-content:flex-end">
              <span style="font-size:22px;font-weight:700;color:#F5F5F5;font-variant-numeric:tabular-nums;letter-spacing:-0.02em">${count}</span>
              <span style="font-size:12px;color:#737373">${pct}%</span>
              ${s.id === 'engajado' && totalBots > 0 ? (() => {
                const parts = [];
                if (bot1x  > 0) parts.push(`${bot1x}×1x`);
                if (botInf > 0) parts.push(`${botInf}×∞`);
                return `<span style="font-size:10px;color:#525252;margin-left:2px">+ <span style="color:#F59E0B">${totalBots} bot${totalBots > 1 ? 's' : ''}</span> <span style="color:#3A3A3A">(${parts.join(' · ')})</span></span>`;
              })() : ''}
            </div>
          </div>
          <div style="background:#0F0F0F;border-radius:4px;height:5px;overflow:hidden">
            <div style="background:#3B82F6;height:100%;width:${barW}%;border-radius:4px"></div>
          </div>
        </div>`;
    }

    const overlay = document.createElement('div');
    overlay.id = 'funnel-modal-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9998;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);overflow-y:auto';
    overlay.innerHTML = `
      <div style="background:#141414;border:1px solid #262626;border-radius:16px;padding:28px;width:480px;max-width:100%;flex-shrink:0">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
          <div>
            <h3 style="font-size:16px;font-weight:700;color:#F5F5F5;margin:0 0 3px">Funil de Vendas</h3>
            <p style="font-size:11px;color:#525252;margin:0">${counts.abordado} leads abordados · ${totalPerdidos} perdidos · ${counts.fechado} fechados</p>
          </div>
          <button id="fnl-close" style="color:#737373;background:transparent;border:none;cursor:pointer;font-size:20px;line-height:1;padding:4px">✕</button>
        </div>

        ${counts.abordado === 0
          ? `<p style="font-size:13px;color:#525252;text-align:center;padding:32px 0">Nenhum lead abordado ainda.<br><span style="font-size:12px">O funil será preenchido conforme você avança os contatos no kanban.</span></p>`
          : `<div style="display:flex;flex-direction:column;gap:0">${STAGE_META.map(s => stageBlock(s)).join('')}</div>`
        }

        ${sortedReasons.length > 0 ? `
        <div style="border-top:1px solid #1E1E1E;margin-top:22px;padding-top:20px">
          <p style="font-size:10px;color:#404040;text-transform:uppercase;letter-spacing:0.1em;font-weight:600;margin-bottom:14px">Motivos de perda · ${totalPerdidos} leads</p>
          <div style="display:grid;gap:10px">
            ${sortedReasons.map(([reason, count]) => {
              const pct = Math.round(count / totalPerdidos * 100);
              return `
              <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
                <span style="font-size:12px;color:#A3A3A3;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(reason)}</span>
                <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
                  <div style="background:#1E1E1E;border-radius:3px;height:4px;width:60px;overflow:hidden">
                    <div style="background:#EF4444;height:100%;width:${pct}%;border-radius:3px"></div>
                  </div>
                  <span style="font-size:12px;font-weight:600;color:#F5F5F5;min-width:14px;text-align:right">${count}</span>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>` : ''}

        <p style="font-size:11px;color:#2E2E2E;margin-top:18px;text-align:center;line-height:1.5">Para leads históricos, abra "Editar dados" e defina a etapa máxima atingida.</p>
      </div>`;

    document.body.appendChild(overlay);
    document.getElementById('fnl-close').addEventListener('click', () => overlay.remove());
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  }

  // Força envio de todos os leads com dados para o Supabase (sincronização completa)
  async function forceSyncAll() {
    if (!CLOUD_MODE) { toast('Supabase não configurado'); return; }
    const btn = document.getElementById('btn-force-sync');
    if (btn) { btn.disabled = true; btn.style.opacity = '0.4'; }
    setSyncStatus('Sincronizando…', '#F59E0B');

    const leads = LEADS.leads.filter(l => {
      const ls = state.leads[l.id];
      return ls && (ls.status !== 'novo' || (ls.notes||[]).length > 0 ||
        (ls.activity||[]).length > 0 || ls.followup_start || ls.overrides);
    });

    let ok = 0, semId = 0;
    for (const l of leads) {
      const hadId = !!supabaseIdMap[l.id];
      await cloudUpsertLead(l.id);
      if (!hadId && !supabaseIdMap[l.id]) semId++;
      else ok++;
      await new Promise(r => setTimeout(r, 80));
    }

    if (btn) { btn.disabled = false; btn.style.opacity = ''; }
    setSyncStatus('Sincronizado', '#10B981');
    const msg = semId > 0
      ? `✓ ${ok} sincronizados · ⚠️ ${semId} sem ID no Supabase`
      : `✓ ${ok} leads sincronizados com Supabase`;
    toast(msg);
  }

    URL.revokeObjectURL(url);
    toast('Backup completo salvo');
  }

      // Reset cloud: zera status/notes/activity para todos os leads desta agência

        .from('leads')
        .update({ status: 'novo', notes: [], activity: [] })

        .then(() => bumpPending(-1))

    renderKanban();

  // ==========================================================================
  // FILTROS (chips + dropdowns)
  // ==========================================================================
  function initFilters() {
    // Chips simples (naoContactados, novosNestaRodada, gmb_alta, tp_alta)
    document.querySelectorAll('.chip[data-filter]').forEach(chip => {
      chip.addEventListener('click', () => {
        const k = chip.dataset.filter;
        filters[k] = !filters[k];
        chip.classList.toggle('active', filters[k]);
        renderKanban();
      });
    });

    // Dados do lead — dropdown multi-check (position:fixed para não ficar atrás do kanban)
    const btnDados   = document.getElementById('btn-dados-filter');
    const dropDados  = document.getElementById('dados-dropdown');
    function updateDadosBtn() {
      const n = dropDados.querySelectorAll('input[data-df]:checked').length;
      btnDados.textContent = n > 0 ? `Dados (${n}) ▾` : 'Dados do lead ▾';
      btnDados.classList.toggle('has-active', n > 0);
    }
    btnDados.addEventListener('click', (e) => {
      e.stopPropagation();
      const opening = dropDados.classList.contains('hidden');
      if (opening) {
        const r = btnDados.getBoundingClientRect();
        dropDados.style.top  = (r.bottom + 4) + 'px';
        dropDados.style.left = r.left + 'px';
      }
      dropDados.classList.toggle('hidden');
    });
    dropDados.querySelectorAll('input[data-df]').forEach(cb => {
      cb.addEventListener('change', () => {
        filters[cb.dataset.df] = cb.checked;
        updateDadosBtn();
        renderKanban();
      });
    });
    document.addEventListener('click', (e) => {
      if (!document.getElementById('dados-filter-wrap').contains(e.target)) {
        dropDados.classList.add('hidden');
      }
    });

    // Follow-up por etapa — select nativo
    document.getElementById('filter-followup').addEventListener('change', (e) => { filters.followupEtapa = e.target.value; renderKanban(); });

    // Nicho select
    const nichos = [...new Set(LEADS.leads.map(l => l.segmento).filter(Boolean))].sort();
    const selNicho = document.getElementById('filter-nicho');
    if (nichos.length <= 1) {
      selNicho.style.display = 'none';
    } else {
      nichos.forEach(n => {
        const opt = document.createElement('option');
        opt.value = n; opt.textContent = n;
        selNicho.appendChild(opt);
      });
    }
    selNicho.addEventListener('change', (e) => { filters.nicho = e.target.value; renderKanban(); });

    // Cidade select
    const cidades = [...new Set(LEADS.leads.map(l => l.cidade).filter(Boolean))].sort();
    const sel = document.getElementById('filter-cidade');
    cidades.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c; opt.textContent = c;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', (e) => { filters.cidade = e.target.value; renderKanban(); });

    // Limpar filtros
    document.getElementById('btn-clear-filters').addEventListener('click', () => {
      filters = {
        naoContactados: false, novosNestaRodada: false,
        ig: false, wa: false, dono: false, cnpj: false, meta: false, email: false, prio: false,
        followupEtapa: '', cidade: '', nicho: '', gmb_alta: false, tp_alta: false,
        minhasAbordagens: false,
      };
      document.querySelectorAll('.chip[data-filter]').forEach(c => c.classList.remove('active'));
      dropDados.querySelectorAll('input[data-df]').forEach(cb => cb.checked = false);
      updateDadosBtn();
      document.getElementById('filter-followup').value = '';
      selNicho.value = '';
      sel.value = '';
      renderKanban();
    });
  }

  // ==========================================================================

  function initKeybindings() {
    document.addEventListener('keydown', (e) => {
      // Cmd+K / Ctrl+K
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        openPalette();
      }
      // ESC
      if (e.key === 'Escape') {
        if (document.getElementById('palette').classList.contains('visible')) closePalette();
        else if (document.getElementById('dossier').classList.contains('open')) closeDossier();
        else if (!document.getElementById('confirm-backdrop').classList.contains('hidden-force')) closeConfirm();
      }
      // Palette navigation
      if (document.getElementById('palette').classList.contains('visible')) {
        const items = document.querySelectorAll('#palette-list .palette-item');
        if (e.key === 'ArrowDown') { e.preventDefault(); paletteIndex = Math.min(items.length-1, paletteIndex+1); highlightPalette(); }
        if (e.key === 'ArrowUp')   { e.preventDefault(); paletteIndex = Math.max(0, paletteIndex-1); highlightPalette(); }
        if (e.key === 'Enter')     { e.preventDefault(); if (items[paletteIndex]) executePaletteItem(items[paletteIndex]); }
      }
    });
    // Palette input
    document.getElementById('palette-input').addEventListener('input', (e) => renderPalette(e.target.value));
    // Backdrops
    document.getElementById('palette-backdrop').addEventListener('click', closePalette);
    document.getElementById('dossier-backdrop').addEventListener('click', closeDossier);
  }

  // ==========================================================================
  // TABS (do dossie)
  // ==========================================================================
  function initTabs() {
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

  // ==========================================================================
  // EXECUCOES (modal)
  // ==========================================================================
  function fmtTimeAgo(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return 'agora';
    if (diff < 3600) return Math.floor(diff / 60) + ' min atrás';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h atrás';
    return d.toLocaleString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  async function openExecucoes() {
    document.getElementById('execs-backdrop').classList.remove('hidden-force');
    document.getElementById('execs-modal').classList.remove('hidden-force');
    const body = document.getElementById('execs-body');
    body.innerHTML = '<p class="text-ink-dim italic">Carregando histórico...</p>';
    const lista = await cloudFetchExecucoes();
    if (!lista.length) {
      body.innerHTML = '<p class="text-ink-dim italic">Nenhuma execução registrada ainda. Rode o pipeline para começar.</p>';
      return;
    }
    body.innerHTML = `
      <div class="space-y-3">
        ${lista.map(e => `
          <div class="bg-panel border border-line rounded-lg p-4">
            <div class="flex items-baseline justify-between gap-3 mb-2">
              <div>
                <span class="font-display text-[14px] text-ink">${esc(e.segmento || 'geral')}</span>
                <span class="text-[12px] text-ink-dim ml-2">${esc(e.cidade || '')}</span>
              </div>
              <span class="text-[11px] text-ink-faded font-mono">${fmtTimeAgo(e.data_execucao)}</span>
            </div>
            <div class="flex items-center gap-4 text-[12px]">
              <span><span class="text-emerald-400 font-bold nums">+${e.leads_novos || 0}</span> <span class="text-ink-dim">novos</span></span>
              <span><span class="text-ink-muted nums">${e.leads_existentes || 0}</span> <span class="text-ink-dim">preservados</span></span>
              <span class="text-ink-faded">${e.leads_extraidos || 0} extraídos · ${e.duracao_segundos || 0}s</span>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }
  function closeExecucoes() {
    document.getElementById('execs-backdrop').classList.add('hidden-force');
    document.getElementById('execs-modal').classList.add('hidden-force');
  }

  // ==========================================================================
  // CLOUD INIT — busca estado da nuvem e mescla com state local
  // ==========================================================================
  // Salva backup diário do estado local ANTES do sync com Supabase
  function saveLocalBackup() {
    try {
      const hoje = new Date().toISOString().slice(0, 10); // YYYY-MM-DD
      const backupKey = LS_KEY + '_bkp_' + hoje;
      if (!localStorage.getItem(backupKey)) {
        localStorage.setItem(backupKey, JSON.stringify(state));
      }
      // Mantém apenas os últimos 7 dias — limpa backups antigos
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith(LS_KEY + '_bkp_')) {
          const d = k.replace(LS_KEY + '_bkp_', '');
          const diasAtras = (Date.now() - new Date(d).getTime()) / 86400000;
          if (diasAtras > 7) localStorage.removeItem(k);
        }
      }
    } catch (e) { /* localStorage pode estar cheio — ignora */ }
  }

  // Lista backups disponíveis (para restauração)
  function listLocalBackups() {
    const backups = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(LS_KEY + '_bkp_')) {
        const data = k.replace(LS_KEY + '_bkp_', '');
        try {
          const s = JSON.parse(localStorage.getItem(k));
          const naoNovo = Object.values(s.leads || {}).filter(l => l.status && l.status !== 'novo').length;
          const comNota = Object.values(s.leads || {}).filter(l => (l.notes||[]).length > 0).length;
          backups.push({ key: k, data, naoNovo, comNota });
        } catch (e) {}
      }
    }
    return backups.sort((a, b) => b.data.localeCompare(a.data));
  }

  async function bootCloud() {
    if (!CLOUD_MODE) return;
    // Backup do estado local antes de qualquer sync com a nuvem
    saveLocalBackup();
    document.getElementById('sync-indicator').classList.remove('hidden');
    document.getElementById('btn-execucoes').classList.remove('hidden');
    document.getElementById('chip-nao-contactados').style.display = '';
    document.getElementById('chip-novos').style.display = '';
    // Pre-marcar chip "naoContactados" como ativo
    const chip = document.querySelector('.chip[data-filter="naoContactados"]');
    if (chip && filters.naoContactados) chip.classList.add('active');

    if (!supabaseClient) {
      setSyncStatus('Aguardando lib...', '#F59E0B');
      // Aguarda supabase-js (defer carrega depois do DOM)
      let tentativas = 0;
      while (typeof supabase === 'undefined' && tentativas < 30) {
        await new Promise(r => setTimeout(r, 100));
        tentativas++;
      }
      if (typeof supabase !== 'undefined' && supabase.createClient) {
        supabaseClient = supabase.createClient(CRM_CONFIG.supabaseUrl, CRM_CONFIG.supabaseAnonKey, {
          auth: { persistSession: false },
        });
      } else {
        setSyncStatus('Lib falhou', '#EF4444');
        return;
      }
    }

    const cloud = await cloudFetchLeads();
    if (!cloud) return;
    if (cloud.length === 0) {
      setSyncStatus('Vazio', '#F59E0B');
      return;
    }
    // Primeiro passo: popula o mapa de IDs para que cloudUpsertLead funcione
    cloud.forEach(c => {
      const lid = parseInt(c.external_id);
      if (isNaN(lid)) return;
      supabaseIdMap[lid] = c.id;
    });

    // Segundo passo: mescla estado — cloud prevalece só se tiver dados reais
    const leadsParaPushLocal = [];
    const leadsNeedingReason = [];
    cloud.forEach(c => {
      const lid = parseInt(c.external_id);
      if (isNaN(lid)) return;
      if (!state.leads[lid]) return;

      const cloudStatus   = c.status || 'novo';
      const cloudNotes    = c.notes    || [];
      const cloudActivity = c.activity || [];
      const cloudTemDados = cloudStatus !== 'novo' || cloudNotes.length > 0 || cloudActivity.length > 0;

      const localStatus   = state.leads[lid].status    || 'novo';
      const localNotes    = state.leads[lid].notes      || [];
      const localActivity = state.leads[lid].activity   || [];
      const localTemDados = localStatus !== 'novo' || localNotes.length > 0 || localActivity.length > 0;

      if (cloudTemDados) {
        // Supabase tem trabalho real → é a fonte autoritativa
        state.leads[lid].status   = cloudStatus;
        state.leads[lid].notes    = cloudNotes;
        state.leads[lid].activity = cloudActivity;
      }
      // Normaliza status N8N que não têm coluna kanban própria
      if (state.leads[lid].status === 'desqualificado') {
        state.leads[lid].status = 'perdeu';
        if (!state.leads[lid].loss_reason) {
          state.leads[lid].needs_loss_reason = true;
          leadsNeedingReason.push(lid);
        }
        if (!state.leads[lid].activity?.some(a => a.type === 'loss')) {
          state.leads[lid].activity = state.leads[lid].activity || [];
          state.leads[lid].activity.unshift({ t: Date.now(), type: 'loss', msg: '🤖 Desqualificado pelo agente N8N — motivo pendente' });
        }
      }
      // historico_resumido é sempre da nuvem (escrito pelo N8N)
      if (c.historico_resumido) {
        const tinhaBot = !!state.leads[lid].historico_resumido;
        state.leads[lid].historico_resumido = c.historico_resumido;
        // N8N assumiu um lead manual → limpa sub-coluna manual (salvo se controle manual ativo)
        if (!tinhaBot && state.leads[lid].overrides?.abordado_subcol && !state.leads[lid].overrides?.manual_control) {
          delete state.leads[lid].overrides.abordado_subcol;
        }
      }
      // is_bot: lido da nuvem (pode ser escrito pelo N8N ou pelo CRM)
      if (c.is_bot) {
        state.leads[lid].is_bot = c.is_bot;
      }
      if (c.overrides && Object.keys(c.overrides).length > 0) {
        // Local vence sobre cloud para chaves existentes — garante que ações
        // recentes do usuário (ex: arraste entre sub-colunas) não sejam
        // sobrescritas por dados ainda não atualizados no Supabase.
        state.leads[lid].overrides = { ...(c.overrides || {}), ...(state.leads[lid].overrides || {}) };
      }
      if (cloudTemDados) {
        // já tratado acima
      } else if (localTemDados) {
        // Local tem trabalho mas Supabase está em branco → sobe o local para o Supabase
        leadsParaPushLocal.push(lid);
      }
      // Se ambos estão vazios, mantém o local (nenhuma mudança necessária)

      const local = LEADS.leads.find(l => l.id === lid);
      if (local) local.novo_nesta_rodada = !!c.novo_nesta_rodada;
    });

    // Recupera followup_start perdido a partir do histórico de atividade
    repairFollowupStart();

    saveState();
    renderKanban();
    renderHeaderStats();

    // Sobe para o Supabase qualquer lead que estava à frente localmente
    if (leadsParaPushLocal.length > 0) {
      leadsParaPushLocal.forEach(lid => cloudUpsertLead(lid));
    }

    // Mostra popups sequenciais para leads desqualificados pelo N8N sem motivo definido
    if (leadsNeedingReason.length > 0) {
      showN8nLossReasonQueue(leadsNeedingReason.slice());
    }
  }

  function showN8nLossReasonQueue(queue) {
    if (queue.length === 0) return;
    const lid = queue.shift();
    const ls = state.leads[lid];
    const lead = LEADS.leads.find(l => l.id === lid);
    if (!lead || !ls?.needs_loss_reason) { showN8nLossReasonQueue(queue); return; }

    // Extrai as últimas mensagens do histórico como contexto
    const hist = ls.historico_resumido || '';
    const linhas = hist.split('\n').filter(l => l.trim()).slice(-6);
    const contexto = linhas.join('\n');

    showLossReasonPopup(lid, 'perdeu', 'desqualificado', () => {
      delete state.leads[lid].needs_loss_reason;
      saveState();
      // Próximo da fila após um pequeno delay
      setTimeout(() => showN8nLossReasonQueue(queue), 300);
    }, contexto, lead.nome || lead.displayName || `Lead #${lid}`);
  }

  // ==========================================================================
  // INIT
  // ==========================================================================
  function init() {
    // Tema
    if (state.theme === 'light') document.body.classList.add('light');
    // Render inicial
    renderHeaderStats();
    renderKanban();
    initFilters();
    initKeybindings();
    initTabs();

    // Botoes do header
    document.getElementById('btn-search').addEventListener('click', openPalette);
    document.getElementById('btn-export').addEventListener('click', exportCsv);
    document.getElementById('btn-force-sync').addEventListener('click', forceSyncAll);
    document.getElementById('btn-backup').addEventListener('click', exportBackupJson);
    document.getElementById('btn-funnel').addEventListener('click', openFunnelModal);
    document.getElementById('btn-reset').addEventListener('click', openConfirm);
    document.getElementById('btn-theme').addEventListener('click', toggleTheme);
    document.getElementById('btn-execucoes').addEventListener('click', openExecucoes);
    document.getElementById('execs-close').addEventListener('click', closeExecucoes);
    document.getElementById('execs-backdrop').addEventListener('click', closeExecucoes);
    document.getElementById('confirm-cancel').addEventListener('click', closeConfirm);
    document.getElementById('confirm-ok').addEventListener('click', doReset);

    // Cloud sync (não bloqueia render)
    bootCloud();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

    window.releaseToN8n = function(leadId) {
      const ls = state.leads[leadId];
      if (!ls?.overrides) return;
      delete ls.overrides.manual_control;
      delete ls.overrides.abordado_subcol;
      ls.activity = ls.activity || [];
      ls.activity.unshift({ t: Date.now(), type: 'n8n_release', msg: '🤖 Controle devolvido ao N8N' });
      saveState();
      cloudUpsertLead(leadId, { skipStatus: true });
      renderKanban();
      const lead = LEADS.leads.find(l => l.id === leadId);
      if (lead) { renderDossierHead(lead); renderDossierBody(lead); }
      toast('🤖 Controle devolvido ao N8N');
    };

    window.takeManualControl = function(leadId) {
      const ls = state.leads[leadId];
      if (!ls) return;
      ls.overrides = ls.overrides || {};
      ls.overrides.manual_control = true;
      // Preserva a sub-coluna atual calculada pelo N8N como ponto de partida
      if (!ls.overrides.abordado_subcol) {
        ls.overrides.abordado_subcol = getAbordadoSubcol(leadId);
      }
      ls.activity = ls.activity || [];
      ls.activity.unshift({ t: Date.now(), type: 'manual_override', msg: '✋ Controle manual ativado pelo operador' });
      saveState();
      cloudUpsertLead(leadId, { skipStatus: true });
      renderKanban();
      const lead = LEADS.leads.find(l => l.id === leadId);
      if (lead) { renderDossierHead(lead); renderDossierBody(lead); }
      toast('✋ Controle manual ativado');
    };

  window.openPendingLossReason = function(leadId) {
    const ls = state.leads[leadId];
    const lead = LEADS.leads.find(l => l.id === leadId);
    if (!lead || !ls) return;
    const hist = ls.historico_resumido || '';
    const linhas = hist.split('\n').filter(l => l.trim()).slice(-6);
    showLossReasonPopup(leadId, 'perdeu', 'perdeu', () => {
      delete ls.needs_loss_reason;
      saveState();
      renderKanban();
    }, linhas.join('\n'), lead.nome || `Lead #${leadId}`);
  };

  // Expõe funções usadas em onclick inline para o escopo global
  window.openEditModal  = openEditModal;
  window.saveLeadEdit   = saveLeadEdit;
  window.toggleBot      = toggleBot;
  window.copyGancho     = copyGancho;
  window.copyFuMsg      = copyFuMsg;
  window.markFuSent     = markFuSent;
})();
</script>
